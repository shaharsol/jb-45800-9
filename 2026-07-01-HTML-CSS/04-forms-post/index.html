
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>contact us</p>
    <form action="thanks.html" method="POST">
        <input placeholder="name" id="name" value="Orit"/>
        <br /><span>birthdate:</span> <input />
        <br /><label for="phone">phone: </label><input id="phone"/>

        <!-- input type text -->
        <!-- if i dont explictly mention the input type
        type will be text -->
        <br/><input />
        <br/><input type="text" />

        <!-- type number -->
        <br/><label for="age">age</label>
        <input 
            type="number" 
            step="8" 
            id="age" 
            min="18" 
            max="120"
        />

        <!-- type email -->
        <br/><label for="email">email</label>
        <input 
            id="email" 
            type="email"
        />

        <!-- type color -->
        <br/><label for="eye-color">eye color</label>
        <input 
            id="eye-color" 
            type="color"
            name="eye-color"
        />

        <!-- dates -->
        <br/><label for="birth-date">birth date</label>
        <input 
            id="birth-date" 
            type="date"
            min="1990-01-01"
        />

        <br/><label for="birth-time">birth time</label>
        <input 
            id="birth-time" 
            type="time"
        />

        <br/><label for="birth-date-time">birth date time</label>
        <input 
            id="birth-date-time" 
            type="datetime-local"
        />

        <br/><label for="password">password</label>
        <input 
            id="password" 
            type="password"
        />
        
        <br/><label for="password">password</label>
        <input 
            id="password" 
            type="password"
            name="password"
        />

        <br/><label for="message">message</label>
        <textarea id="message" maxlength="30"></textarea>

        <!-- selections -->
        <br/><label for="country">where do you live?</label>
        <select id="country" name="country">
            <option value="" disabled selected>please select country...</option>
            <option value="COG">Congo, Democratic republic of</option>
            <option value="LIB">Liberia</option>
            <option value="GHN">Ghana</option>
        </select>

        <!-- multi selections -->
        <br/><label for="hobbies">what are your hobbies?</label>
        <select id="hobbies" multiple>
            <option>Golf</option>
            <option>Boxing</option>
            <option>Football</option>
        </select>

        <!-- checkbox -->
        <br/>
        <input type="checkbox" id="agree" name="agree"/>
        <label for="agree">i agree to the terms of use</label>

        <br/>
        <input type="checkbox" id="newsletter" checked/>
        <label for="newsletter">i want to recieve emails</label>
        
        <!-- form buttons -->
        <br/>
        <input type="submit" value="Sign Up"/>
        <br/>
        <button>Sign Up</button>
        <br/>
        <input type="reset" value="clean the form"/>


    </form>
</body>
</html>
